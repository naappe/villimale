<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Voter Management System</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============================================
    PARTY SELECTION SCREEN
    ============================================ -->
    <div class="party-selection-overlay" id="partySelection">
        <div class="party-selection-box">
            <div class="party-selection-icon">
                <i class="fas fa-vote-yea"></i>
            </div>
            <h2>🏛️ Villimale Dhaaira</h2>
            <p class="subtitle">Select a party to view its voter dashboard</p>

            <div class="party-grid">

                <!-- MDP - Yellow/Kenya Colour -->
                <a href="mdp-tracker.html" class="party-card" style="border-color: #f5a623; text-decoration: none;">
                    <div class="party-card-icon" style="background: #f5a623; color: #1a1a2e;">
                        <i class="fas fa-flag"></i>
                    </div>
                    <div class="party-card-info">
                        <div class="party-card-name" style="color: #f5a623;">MDP</div>
                        <div class="party-card-full">Maldivian Democratic Party</div>
                        <div class="party-card-stats">
                            <span class="voter-count">👥 <strong style="color: #f5a623;">490</strong></span>
                            <span class="reg-date">📅 26 Jun 2005</span>
                        </div>
                    </div>
                    <div class="party-card-arrow" style="color: #f5a623;"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- PNC - Turquoise Colour -->
                <a href="pnc-tracker.html" class="party-card" style="border-color: #1abc9c; text-decoration: none;">
                    <div class="party-card-icon" style="background: #1abc9c; color: white;">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="party-card-info">
                        <div class="party-card-name" style="color: #1abc9c;">PNC</div>
                        <div class="party-card-full">Peoples National Congress</div>
                        <div class="party-card-stats">
                            <span class="voter-count">👥 <strong style="color: #1abc9c;">0</strong></span>
                            <span class="reg-date">📅 31 Jan 2019</span>
                        </div>
                    </div>
                    <div class="party-card-arrow" style="color: #1abc9c;"><i class="fas fa-chevron-right"></i></div>
                </a>

            </div>

            <div class="party-selection-footer">
                <span>🔒 Each party requires a password for access</span>
                <span class="total-voters">📊 Total: <strong>490</strong> voters in Villimale Dhaaira</span>
            </div>
        </div>
    </div>

    <script src="config.js"></script>

</body>
</html>
