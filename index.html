<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Voter Management System</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script type="importmap">
        {
            "imports": {
                "./config.js": "./config.js"
            }
        }
    </script>
</head>
<body>

    <!-- ============================================
    NAVIGATION BAR
    ============================================ -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-vote-yea"></i>
            Voter<span>Manager</span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-users"></i> Voters <span class="badge" id="navCount">0</span></a></li>
            <li><a href="#"><i class="fas fa-chart-pie"></i> Analytics</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- ============================================
    MAIN CONTAINER
    ============================================ -->
    <div class="container">

        <!-- ===== STATS ROW ===== -->
        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-number" id="totalVoters">0</span>
                <span class="stat-label">Total Voters</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="maleCount">0</span>
                <span class="stat-label">Male</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="femaleCount">0</span>
                <span class="stat-label">Female</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="houseCount">0</span>
                <span class="stat-label">Houses</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="partyCount">0</span>
                <span class="stat-label">Parties</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="avgAge">0</span>
                <span class="stat-label">Avg Age</span>
            </div>
        </div>

        <!-- ===== TOP HOUSES ===== -->
        <div class="top-houses-section">
            <div class="top-houses-header" id="topHousesToggle">
                <h2><i class="fas fa-trophy"></i> Top Houses <span id="topHousesCount"></span></h2>
                <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div class="top-houses-grid" id="topHouses">
                <div class="loading-state">Loading houses...</div>
            </div>
        </div>

        <!-- ===== FILTERS ===== -->
        <div class="filters-bar">
            <div class="filter-row">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search name, ID, or house..." />
                </div>
                <select id="sexFilter">
                    <option value="">All Genders</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <select id="partyFilter">
                    <option value="">All Parties</option>
                </select>
                <select id="houseFilter">
                    <option value="">All Houses</option>
                </select>
                <div class="age-range">
                    <input type="number" id="ageMin" placeholder="Min" min="0" max="150" />
                    <span>—</span>
                    <input type="number" id="ageMax" placeholder="Max" min="0" max="150" />
                </div>
                <button class="btn-reset" id="resetBtn"><i class="fas fa-undo"></i></button>
            </div>
            <div class="filter-chips" id="filterChips"></div>
        </div>

        <!-- ===== VIEW TOGGLE ===== -->
        <div class="view-toggle-bar">
            <button class="view-toggle-btn active" id="listViewBtn"><i class="fas fa-list"></i> List</button>
            <button class="view-toggle-btn" id="galleryViewBtn"><i class="fas fa-images"></i> Gallery</button>
        </div>

        <!-- ===== VOTER LIST VIEW ===== -->
        <div class="voter-list-section" id="listSection">
            <div class="list-header">
                <h2><i class="fas fa-list"></i> Voters <span id="voterCountDisplay"></span></h2>
            </div>
            <div id="voterList" class="voter-list">
                <div class="loading-state">Loading voters...</div>
            </div>
            <div class="pagination" id="pagination">
                <button id="prevPage"><i class="fas fa-chevron-left"></i></button>
                <span id="pageInfo">Page 1 of 1</span>
                <button id="nextPage"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- ===== PHOTO GALLERY VIEW ===== -->
        <div class="gallery-section" id="gallerySection" style="display:none;">
            <div class="list-header">
                <h2><i class="fas fa-images"></i> Photo Gallery <span id="galleryCount"></span></h2>
            </div>
            <div class="photo-grid" id="photoGrid">
                <div class="loading-state">Loading gallery...</div>
            </div>
            <div class="pagination" id="galleryPagination">
                <button id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
                <span id="galleryPageInfo">Page 1 of 1</span>
                <button id="galleryNext"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

    </div>

    <!-- ============================================
    VOTER POPUP
    ============================================ -->
    <div class="voter-popup-overlay" id="voterPopup">
        <div class="voter-popup">
            <button class="voter-popup-close" id="voterPopupClose">&times;</button>
            <div class="voter-popup-content" id="voterPopupContent">
                <div class="popup-loading">Loading...</div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
